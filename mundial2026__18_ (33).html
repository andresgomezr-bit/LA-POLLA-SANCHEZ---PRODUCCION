// Prefijos de config por fase
const CFG_FASE = {
  dieciseisavos:"d16", octavos:"oct", cuartos:"cua",
  semifinales:"sem", final:"fin", tercerPuesto:"ter", grupos:"g"
};

function calcPuntos(pron, res, cfg, fase) {
  if (!pron || !res) return 0;
  let pts = 0;
  const pre = CFG_FASE[fase] || "g";

  // Leer puntos configurados — Number() evita bug string vs número de Firebase
  const ptsMarcador = (cfg[pre+"_marcador"] !== undefined && cfg[pre+"_marcador"] !== null)
    ? Number(cfg[pre+"_marcador"]) : (PUNTOS_DEFAULT[pre+"_marcador"] ?? 0);
  const ptsGanador  = (cfg[pre+"_ganador"]  !== undefined && cfg[pre+"_ganador"]  !== null)
    ? Number(cfg[pre+"_ganador"])  : (PUNTOS_DEFAULT[pre+"_ganador"]  ?? 0);

  // Marcador a 90 minutos — siempre
  const rl = Number(res.gl);  const rv = Number(res.gv);
  const pl = Number(pron.gl); const pv = Number(pron.gv);

  if (!res.esEliminatoria) {
    // ── GRUPOS ──
    // Marcador exacto
    if (pl===rl && pv===rv) pts += ptsMarcador;
    // Ganador o empate
    if ((rl>rv&&pl>pv)||(rl<rv&&pl<pv)||(rl===rv&&pl===pv)) pts += ptsGanador;

  } else {
    // ── ELIMINATORIAS ──
    // 1) Marcador exacto a 90 min
    if (pl===rl && pv===rv) pts += ptsMarcador;
    // 2) Quién avanza (independiente del marcador)
    if (res.ganadorFinal && pron.ganadorFinal && res.ganadorFinal===pron.ganadorFinal)
      pts += ptsGanador;
  }
  return pts;
}

function calcPodios(espUser, espRes, cfg) {
  if (!espUser || !espRes) return 0;
  let pts = 0;
  const _p = (k,d) => (cfg[k]!==undefined&&cfg[k]!==null) ? cfg[k] : d;
  if (espUser.campeon    && espRes.campeon    && espUser.campeon===espRes.campeon)       pts += _p("pod_campeon",15);
  if (espUser.subcampeon && espRes.subcampeon && espUser.subcampeon===espRes.subcampeon) pts += _p("pod_subcampeon",10);
  if (espUser.tercero    && espRes.tercero    && espUser.tercero===espRes.tercero)       pts += _p("pod_tercero",8);
  if (espUser.cuarto     && espRes.cuarto     && espUser.cuarto===espRes.cuarto)         pts += _p("pod_cuarto",6);
  if (espUser.goleador   && espRes.goleador   && espUser.goleador===espRes.goleador)     pts += _p("pod_goleador",10);
  if (espUser.arquero    && espRes.arquero    && espUser.arquero===espRes.arquero)       pts += _p("pod_arquero",10);
  if (espUser.eliminado  && espRes.eliminado  && espUser.eliminado===espRes.eliminado)   pts += _p("pod_eliminado",8);
  return pts;
}

// APP RAÍZ
// ══════════════════════════════════════════════
function App() {
  const [pan, setPan] = useState("login");
  const [user, setUser] = useState(null);
  const [cargando, setCargando] = useState(true);

  // Estado en Firebase
  const [usuarios, setUsuarios] = useState({});
  const [eqElim, setEqElim]    = useState({});
  const [prons, setProns]       = useState({});
  const [results, setResults]   = useState({});
  const [cfg, setCfg]           = useState(PUNTOS_DEFAULT);
  const [esp, setEsp]           = useState({});

  // Siempre generar partidos frescos con horarios oficiales (no usar caché)
  const [partidos] = useState(() => {
    const p = [...generarGrupos(),...generarElim()];
    ST.s("mw26_p", p); // Actualizar caché con horarios correctos
    return p;
  });

  // Suscribir a Firebase en tiempo real
  useEffect(() => {
    const unsubs = [];
    unsubs.push(FB.on("usuarios", v => { setUsuarios(v||{}); setCargando(false); }));
    unsubs.push(FB.on("eqElim",   v => setEqElim(v||{})));
    unsubs.push(FB.on("prons",    v => setProns(v||{})));
    unsubs.push(FB.on("results",  v => setResults(v||{})));
    unsubs.push(FB.on("cfg",      v => { if(v) setCfg(v); }));
    unsubs.push(FB.on("esp",      v => setEsp(v||{})));
    // Crear admin si no existe
    FB.get("usuarios/admin__AT__mundial2026_co").then(v => {
      if (!v) FB.set("usuarios/admin__AT__mundial2026_co", {
        nombre:"Administrador", email:"admin@mundial2026.co",
        clave:"admin2026", esAdmin:true
      });
    });
    return () => unsubs.forEach(u => u && u());
  }, []);

  const partsTodos = partidos.map(p =>
    p.esEliminatoria
      ? {...p, local:eqElim[p.id+"_L"]||null, visitante:eqElim[p.id+"_V"]||null}
      : p
  );

  function login(email, clave) {
    const key = FB.emailKey(email);
    const u = usuarios[key];
    if (!u || u.clave !== clave) return "Correo o contraseña incorrectos";
    setUser(u); setPan("app"); return null;
  }

  function registrar(nombre, email, clave) {
    const key = FB.emailKey(email);
    if (usuarios[key]) return "Este correo ya está registrado";
    if (clave.length < 6) return "La contraseña debe tener mínimo 6 caracteres";
    const u = {nombre, email, clave, esAdmin:false};
    FB.set("usuarios/"+key, u);
    setUser(u); setPan("app"); return null;
  }

  function salir() { setUser(null); setPan("login"); }

  function borrarPronsJugador(email) {
    const key = FB.emailKey(email);
    // Borrar todos los pronósticos cuya clave empiece con el emailKey del jugador
    FB.get("prons").then(todosLosProns => {
      if (!todosLosProns) return;
      const updates = {};
      Object.keys(todosLosProns).forEach(k => {
        if (k.startsWith(key + "_")) updates[k] = null;
      });
      if (Object.keys(updates).length > 0) {
        db.ref("prons").update(updates);
      }
    });
    // Borrar especiales del jugador
    FB.set("esp/" + key, null);
  }

  function recuperarClave(email, callback) {
    const key = FB.emailKey(email);
    FB.get("usuarios/"+key).then(u => {
      if (!u) {
        callback("❌ No encontramos ese correo registrado.");
      } else {
        callback("✅ Tu contraseña es: " + u.clave);
      }
    });
  }

  function puedePron(p) { return new Date(p.fecha)-new Date() > 60*60*1000; }

  function guardarPron(pid, d) {
    const key = FB.emailKey(user.email);
    FB.set(`prons/${key}_${pid}`, d);
  }

  function guardarRes(pid, d) {
    FB.set(`results/${pid}`, d);
    // Sin propagación automática — admin asigna llaves manualmente en todas las fases
  }

  function propagarGanador(pid, ganador, fase, numPartido) {
    // Mapeo de bracket: qué partido sigue y en qué posición (L o V)
    const bracket = {
      // Dieciseisavos → Octavos
      // Partido 1 (D16-1) ganador va a Octavos partido 1 como Local
      dieciseisavos: {
        1:  {sigFase:"octavos", sigPartido:1, pos:"L"},
        2:  {sigFase:"octavos", sigPartido:1, pos:"V"},
        3:  {sigFase:"octavos", sigPartido:2, pos:"L"},
        4:  {sigFase:"octavos", sigPartido:2, pos:"V"},
        5:  {sigFase:"octavos", sigPartido:3, pos:"L"},
        6:  {sigFase:"octavos", sigPartido:3, pos:"V"},
        7:  {sigFase:"octavos", sigPartido:4, pos:"L"},
        8:  {sigFase:"octavos", sigPartido:4, pos:"V"},
        9:  {sigFase:"octavos", sigPartido:5, pos:"L"},
        10: {sigFase:"octavos", sigPartido:5, pos:"V"},
        11: {sigFase:"octavos", sigPartido:6, pos:"L"},
        12: {sigFase:"octavos", sigPartido:6, pos:"V"},
        13: {sigFase:"octavos", sigPartido:7, pos:"L"},
        14: {sigFase:"octavos", sigPartido:7, pos:"V"},
        15: {sigFase:"octavos", sigPartido:8, pos:"L"},
        16: {sigFase:"octavos", sigPartido:8, pos:"V"},
      },
      // Octavos → Cuartos
      octavos: {
        1: {sigFase:"cuartos", sigPartido:1, pos:"L"},
        2: {sigFase:"cuartos", sigPartido:1, pos:"V"},
        3: {sigFase:"cuartos", sigPartido:2, pos:"L"},
        4: {sigFase:"cuartos", sigPartido:2, pos:"V"},
        5: {sigFase:"cuartos", sigPartido:3, pos:"L"},
        6: {sigFase:"cuartos", sigPartido:3, pos:"V"},
        7: {sigFase:"cuartos", sigPartido:4, pos:"L"},
        8: {sigFase:"cuartos", sigPartido:4, pos:"V"},
      },
      // Cuartos → Semifinales
      cuartos: {
        1: {sigFase:"semifinales", sigPartido:1, pos:"L"},
        2: {sigFase:"semifinales", sigPartido:1, pos:"V"},
        3: {sigFase:"semifinales", sigPartido:2, pos:"L"},
        4: {sigFase:"semifinales", sigPartido:2, pos:"V"},
      },
      // Semifinales → Final y Tercer Puesto
      semifinales: {
        1: [{sigFase:"final", sigPartido:1, pos:"L"}, {sigFase:"tercerPuesto", sigPartido:1, pos:"L"}],
        2: [{sigFase:"final", sigPartido:1, pos:"V"}, {sigFase:"tercerPuesto", sigPartido:1, pos:"V"}],
      },
    };

    const sig = bracket[fase]?.[numPartido];
    if (!sig) return;

    const destinos = Array.isArray(sig) ? sig : [sig];
    destinos.forEach(dest => {
      // Solo propagar ganador a la Final; para tercer puesto propagar el PERDEDOR
      let equipoFinal = ganador;
      if (dest.sigFase === "tercerPuesto") {
        // El que va al tercer puesto es el perdedor de semifinal
        const partido = partsTodos.find(p=>p.fase===fase&&p.partido===numPartido);
        if (partido) {
          equipoFinal = dest.pos==="L" ? partido.local : partido.visitante;
          // El perdedor es el que NO es el ganador
          if (equipoFinal === ganador) {
            equipoFinal = equipoFinal === partido.local ? partido.visitante : partido.local;
          }
        }
      }
      // Encontrar el partido destino y actualizar su equipo
      const partDest = partsTodos.find(p=>p.fase===dest.sigFase&&p.partido===dest.sigPartido);
      if (partDest) {
        const ladoKey = dest.pos==="L" ? `${partDest.id}_L` : `${partDest.id}_V`;
        FB.set(`eqElim/${ladoKey}`, equipoFinal);
      }
    });
  }

  function asignarEq(pid, lado, eq) {
    FB.set(`eqElim/${pid}_${lado}`, eq||null);
  }

  function guardarCfg(c) {
    setCfg(c);
    FB.set("cfg", c);
  }

  function guardarEsp(fn) {
    const nuevo = fn(esp);
    FB.set("esp", nuevo);
  }

  function calcTabla() {
    const espRes = esp["__res"]||{};
    return Object.values(usuarios).filter(u=>!u.esAdmin).map(u=>{
      let pts=0;
      const key = FB.emailKey(u.email);
      partsTodos.forEach(p=>{
        pts+=calcPuntos(prons[`${key}_${p.id}`], results[p.id], cfg, p.fase);
      });
      pts += calcPodios(esp[key]||{}, espRes, cfg);
      return {...u,pts};
    }).sort((a,b)=>b.pts-a.pts);
  }

  if (cargando) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"var(--bg)",flexDirection:"column",gap:20}}>
      <div style={{fontSize:64}}>🏆</div>
      <div style={{fontFamily:"'Bebas Neue'",fontSize:32,color:"var(--gold)",letterSpacing:3}}>
        LA POLLA SÁNCHEZ
      </div>
      <div style={{color:"var(--muted)",fontSize:14}}>Conectando...</div>
    </div>
  );

  if (pan==="login") return <Login onLogin={login} onReg={()=>setPan("reg")} onRecuperar={recuperarClave}/>;
  if (pan==="reg")   return <Registro onReg={registrar} onVolver={()=>setPan("login")}/>;
  return (
    <Principal user={user} partidos={partsTodos} prons={prons}
      guardarPron={guardarPron} results={results} guardarRes={guardarRes}
      cfg={cfg} setCfg={guardarCfg} esp={esp} setEsp={guardarEsp}
      tabla={calcTabla()} puedePron={puedePron}
      eqElim={eqElim} asignarEq={asignarEq} onSalir={salir}
      borrarPronsJugador={borrarPronsJugador}/>
  );
}

// ══════════════════════════════════════════════
// REGISTRO
// ══════════════════════════════════════════════
function Registro({onReg,onVolver}) {
  const [nombre,setNombre]=useState(""); const [email,setEmail]=useState("");
  const [c1,setC1]=useState(""); const [c2,setC2]=useState(""); const [err,setErr]=useState("");
  function sub(e){
    e.preventDefault();
    if(c1!==c2){setErr("Las contraseñas no coinciden");return;}
    const r=onReg(nombre,email,c1); if(r) setErr(r);
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,
      background:"radial-gradient(ellipse 100% 55% at 50% 0%,rgba(26,122,60,0.3) 0%,transparent 65%),var(--bg)"}}>
      <div style={{width:"100%",maxWidth:390}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:"var(--gold)",letterSpacing:3}}>LA POLLA SÁNCHEZ</div>
          <div style={{color:"var(--muted)",fontSize:11,letterSpacing:3}}>CREAR CUENTA</div>
        </div>
        <Card>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:700,marginBottom:18}}>Crea tu cuenta</div>
          <ErrBox msg={err}/>
          <form onSubmit={sub}>
            {[["Tu nombre completo","text",nombre,setNombre,"Ej: Juan Pérez"],
              ["Correo electrónico","email",email,setEmail,"tu@correo.com"],
              ["Contraseña (mín. 6 caracteres)","password",c1,setC1,"••••••"],
              ["Repetir contraseña","password",c2,setC2,"••••••"]
            ].map(([lbl,type,val,set,ph])=>(
              <div key={lbl} style={{marginBottom:13}}>
                <Lbl>{lbl}</Lbl>
                <input type={type} value={val} onChange={e=>set(e.target.value)} required placeholder={ph}/>
              </div>
            ))}
            <BtnPrimary onClick={sub} style={{width:"100%",padding:13,marginTop:6}}>Registrarme</BtnPrimary>
          </form>
          <div style={{textAlign:"center",marginTop:14}}>
            <button onClick={onVolver} style={{background:"none",border:"none",color:"var(--muted)",fontSize:13,textDecoration:"underline"}}>
              Ya tengo cuenta → Ingresar
            </button>
          </div>
        </Card>
      </div>
    </div>
  );
}

function Principal(props) {
  const {user,onSalir} = props;
  const esAdmin = !!user.esAdmin;

// BANNER PARTIDOS DEL DÍA
// ══════════════════════════════════════════════
function BannerHoy({partidos,prons,userEmail}) {
  const [cerrado,setCerrado] = useState(false);
  if (cerrado) return null;

  const hoy = new Date();
  const bogota = new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(hoy);

  const emailKey = userEmail.replace(/\./g,'_').replace(/@/g,'__AT__');
  const partidosHoy = partidos.filter(p => {
    if (!p.local || !p.visitante) return false;
    const fp = new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(p.fecha));
    return fp === bogota;
  });

  if (partidosHoy.length === 0) return null;

  const sinPron = partidosHoy.filter(p => !prons[`${emailKey}_${p.id}`]);
  const conPron = partidosHoy.length - sinPron.length;

  return (
    <div style={{
      background:"linear-gradient(135deg,rgba(26,122,60,0.3),rgba(232,160,32,0.2))",
      border:"1px solid rgba(232,160,32,0.45)",
      borderRadius:13, padding:"14px 16px", marginBottom:20,
      position:"relative",
    }}>
      <button onClick={()=>setCerrado(true)} style={{
        position:"absolute",top:10,right:12,background:"none",border:"none",
        color:"var(--muted)",fontSize:18,lineHeight:1,padding:2,
      }}>✕</button>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <span style={{fontSize:28}}>📅</span>
        <div>
          <div style={{fontFamily:"'Barlow Condensed'",fontSize:18,fontWeight:700,color:"var(--gold)"}}>
            ¡Hay {partidosHoy.length} partido{partidosHoy.length>1?"s":""} HOY!
          </div>
          <div style={{fontSize:12,color:"var(--muted)"}}>
            {sinPron.length > 0
              ? `⚠️ Te faltan ${sinPron.length} pronóstico${sinPron.length>1?"s":""} por ingresar`
              : "✅ Ya tienes todos tus pronósticos de hoy guardados"}
          </div>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {partidosHoy.map(p => {
          const tienePron = !!prons[`${emailKey}_${p.id}`];
          const hora = new Date(p.fecha).toLocaleTimeString("es-CO",{timeZone:"America/Bogota",hour:"2-digit",minute:"2-digit"});
          const diff = new Date(p.fecha) - hoy;
          const abierto = diff > 60*60*1000;
          const mins = Math.floor(diff/60000);
          let estado = "";
          if (!abierto) estado = "⏰ Cerrado";
          else if (mins < 120) estado = `⚡ Cierra en ${mins} min`;
          else estado = `🕐 ${hora} BOG`;

          return (
            <div key={p.id} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              background:"rgba(0,0,0,0.2)",borderRadius:9,padding:"9px 12px",
              border:`1px solid ${tienePron?"rgba(45,168,84,0.4)":abierto?"rgba(232,160,32,0.25)":"rgba(192,57,43,0.3)"}`,
              flexWrap:"wrap",gap:6,
            }}>
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                <span style={{fontSize:13,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  <Flag p={p.local} sz={15}/> {p.local} <span style={{color:"var(--muted)"}}>vs</span> <Flag p={p.visitante} sz={15}/> {p.visitante}
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{fontSize:11,color:"var(--muted)"}}>{estado}</span>
                <span style={{
                  fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:99,
                  background:tienePron?"rgba(45,168,84,0.2)":abierto?"rgba(232,160,32,0.15)":"rgba(192,57,43,0.15)",
                  color:tienePron?"var(--green2)":abierto?"var(--gold)":"var(--red)",
                }}>
                  {tienePron?"✓ Listo":abierto?"Pendiente":"Sin tiempo"}
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {sinPron.length > 0 && (
        <div style={{marginTop:10,fontSize:12,color:"var(--gold)",textAlign:"center",fontWeight:600}}>
          ⚠️ Recuerda: el ingreso se cierra 60 minutos antes de cada partido
        </div>
      )}
    </div>
  );
}

// TABLA DE POSICIONES POR GRUPO
// ══════════════════════════════════════════════
const ABREV = {
  "República Checa":"Rep. Checa",
  "Corea del Sur":"Corea Sur",
  "Bosnia y Herzegovina":"Bosnia Hz.",
  "Costa de Marfil":"C. Marfil",
  "Estados Unidos":"EE.UU.",
  "Países Bajos":"P. Bajos",
  "Arabia Saudita":"Ara. Saudi",
  "Nueva Zelanda":"N. Zelanda",
  "R.D. del Congo":"R.D. Congo",
  "Cabo Verde":"Cabo Verde",
};
const abrev = (eq) => ABREV[eq] || eq;

function TablaGrupo({grupo, partidos, resultados}) {
  const equipos = GRUPOS[grupo] || [];
  const stats = {};
  equipos.forEach(eq => {
    stats[eq] = {eq, j:0, g:0, e:0, p:0, gf:0, gc:0, pts:0};
  });

  partidos
    .filter(p => p.fase==="grupos" && p.grupo===grupo && resultados[p.id])
    .forEach(p => {
      const res = resultados[p.id];
      const {gl, gv} = res;
      const L = p.local; const V = p.visitante;
      if (!stats[L] || !stats[V]) return;
      stats[L].j++; stats[V].j++;
      stats[L].gf += gl; stats[L].gc += gv;
      stats[V].gf += gv; stats[V].gc += gl;
      if (gl > gv) { stats[L].g++; stats[L].pts += 3; stats[V].p++; }
      else if (gl < gv) { stats[V].g++; stats[V].pts += 3; stats[L].p++; }
      else { stats[L].e++; stats[L].pts++; stats[V].e++; stats[V].pts++; }
    });

  const tabla = Object.values(stats).sort((a,b) =>
    b.pts-a.pts || (b.gf-b.gc)-(a.gf-a.gc) || b.gf-a.gf
  );
  const hayPartidos = partidos.some(p=>p.fase==="grupos"&&p.grupo===grupo&&resultados[p.id]);

  // Columnas fijas en px para alineación perfecta en móvil y escritorio
  const cols = "auto 22px 22px 22px 22px 28px 28px 34px";
  const ColH = ({children,gold}) => (
    <span style={{textAlign:"center",fontSize:9,fontWeight:700,letterSpacing:0.3,
      color:gold?"var(--gold)":"var(--muted)"}}>{children}</span>
  );
  const Col = ({children,green,red,gold,bold}) => (
    <span style={{textAlign:"center",fontSize:12,
      color:gold?"var(--gold)":green?"var(--green2)":red?"var(--red)":"var(--muted)",
      fontWeight:bold?700:400,
      fontFamily:gold?"'Bebas Neue'":"inherit",
      fontSize:gold?15:12,
    }}>{children}</span>
  );

  return (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,color:"var(--gold)",fontWeight:700,letterSpacing:1,
        margin:"8px 0 6px",display:"flex",alignItems:"center",gap:6}}>
        📊 TABLA GRUPO {grupo}
        {!hayPartidos&&<span style={{color:"var(--muted)",fontWeight:400}}> — sin resultados aún</span>}
      </div>
      <div style={{background:"var(--bg3)",borderRadius:9,overflow:"hidden",
        border:"1px solid var(--border)"}}>
        {/* Header */}
        <div style={{display:"grid",gridTemplateColumns:cols,
          padding:"5px 8px",background:"rgba(232,160,32,0.08)",
          borderBottom:"1px solid var(--border)",gap:2}}>
          <span style={{fontSize:9,fontWeight:700,color:"var(--muted)",letterSpacing:0.3}}>EQUIPO</span>
          <ColH>J</ColH><ColH>G</ColH><ColH>E</ColH><ColH>P</ColH>
          <ColH>GF</ColH><ColH>GC</ColH><ColH gold>PTS</ColH>
        </div>
        {/* Filas */}
        {tabla.map((s,i)=>(
          <div key={s.eq} style={{display:"grid",gridTemplateColumns:cols,
            padding:"6px 8px",gap:2,alignItems:"center",
            background:i===0?"rgba(45,168,84,0.08)":i===1?"rgba(45,168,84,0.04)":"transparent",
            borderBottom:i<3?"1px solid rgba(255,255,255,0.05)":"none"}}>
            {/* Equipo */}
            <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0}}>
              <span style={{width:16,height:16,borderRadius:"50%",flexShrink:0,
                background:i<2?"rgba(45,168,84,0.3)":"rgba(255,255,255,0.05)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:8,fontWeight:700,color:i<2?"var(--green2)":"var(--muted)"}}>
                {i+1}
              </span>
              <Flag p={s.eq} sz={13}/>
              <span style={{fontSize:11,color:"var(--text)",fontWeight:i<2?600:400,
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {abrev(s.eq)}
              </span>
            </div>
            <Col>{s.j}</Col>
            <Col green={s.g>0}>{s.g}</Col>
            <Col>{s.e}</Col>
            <Col red={s.p>0}>{s.p}</Col>
            <Col>{s.gf}</Col>
            <Col>{s.gc}</Col>
            <Col gold bold>{s.pts}</Col>
          </div>
        ))}
      </div>
      <div style={{fontSize:9,color:"var(--muted)",marginTop:4,paddingLeft:2}}>
        🟢 Clasifican: top 2 de cada grupo + 8 mejores terceros
      </div>
    </div>
  );
}

// TAB PRONÓSTICOS
// ══════════════════════════════════════════════
function TabProns({user,partidos,prons,results,guardarPron,puedePron,cfg,esAdmin}) {
  const [fase,setFase]=useState("grupos");
  const [grupo,setGrupo]=useState("A");
  const fases=["grupos","dieciseisavos","octavos","cuartos","semifinales","tercerPuesto","final"];
  const lista=partidos.filter(p=>p.fase===fase&&(fase!=="grupos"||p.grupo===grupo));

  // Contadores por fase
  const conPron=(f)=>partidos.filter(p=>p.fase===f&&prons[`${user.email}_${p.id}`]).length;
  const total=(f)=>partidos.filter(p=>p.fase===f).length;

  return (
    <div>
      <Titulo>Mis Pronósticos</Titulo>
      <BannerHoy partidos={partidos} prons={prons} userEmail={user.email}/>
      {/* Fases */}
      <div className="hide-scroll" style={{display:"flex",gap:7,flexWrap:"nowrap",overflowX:"auto",marginBottom:13,paddingBottom:4}}>
        {fases.map(f=>(
          <button key={f} onClick={()=>setFase(f)} style={{
            padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:600,flexShrink:0,
            border:`1px solid ${fase===f?"var(--gold)":"var(--border)"}`,
            background:fase===f?"rgba(232,160,32,0.12)":"transparent",
            color:fase===f?"var(--gold)":"var(--muted)",
          }}>
            {FASE_LABELS[f]}
            {total(f)>0&&<span style={{marginLeft:5,fontSize:10,opacity:0.7}}>{conPron(f)}/{total(f)}</span>}
          </button>
        ))}
      </div>
      {/* Grupos */}
      {fase==="grupos"&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          {Object.keys(GRUPOS).map(g=>(
            <button key={g} onClick={()=>setGrupo(g)} style={{
              width:36,height:36,borderRadius:8,fontSize:13,fontWeight:700,
              border:`1px solid ${grupo===g?"var(--green2)":"var(--border)"}`,
              background:grupo===g?"rgba(45,168,84,0.18)":"transparent",
              color:grupo===g?"var(--green2)":"var(--muted)",
            }}>{g}</button>
          ))}
        </div>
      )}
      {/* Equipos del grupo + tabla de posiciones */}
      {fase==="grupos"&&(
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",padding:"10px 14px",
            background:"var(--bg3)",borderRadius:"10px 10px 0 0",
            borderBottom:"1px solid var(--border)"}}>
            {GRUPOS[grupo].map(eq=>(
              <span key={eq} style={{fontSize:13,color:"var(--text)"}}>
                <Flag p={eq} sz={16}/> {eq}
              </span>
            ))}
          </div>
          <TablaGrupo grupo={grupo} partidos={partidos} resultados={results}/>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:11}}>
        {lista.length===0
          ? <div style={{textAlign:"center",color:"var(--muted)",padding:40}}>No hay partidos en esta fase aún</div>
          : lista.filter(p => !p.esEliminatoria || p.local || esAdmin).length === 0
          ? <div style={{background:"rgba(232,160,32,0.08)",border:"1px solid rgba(232,160,32,0.2)",
              borderRadius:10,padding:"16px 18px",textAlign:"center"}}>
              <div style={{fontSize:15,color:"var(--gold)",marginBottom:6}}>⏳ Llaves por definir</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>
                El administrador aún no ha asignado los equipos a esta fase.<br/>
                Pronto podrás ingresar tus pronósticos.
              </div>
            </div>
          : lista.map(p=>(
            <TarjetaPron key={p.id} partido={p}
              pron={prons[`${user.email.replace(/\./g,'_').replace(/@/g,'__AT__')}_${p.id}`]}
              res={results[p.id]}
              puedo={puedePron(p)&&!esAdmin}
              soloLectura={esAdmin}
              onGuardar={d=>guardarPron(p.id,d)}
              cfg={cfg}/>
          ))
        }
      </div>
    </div>
  );
}

function TarjetaPron({partido,pron,res,puedo,onGuardar,cfg,soloLectura=false}) {
  const [gl,setGl]=useState(pron?.gl??"");
  const [gv,setGv]=useState(pron?.gv??"");
  const [glET,setGlET]=useState(pron?.glET??"");
  const [gvET,setGvET]=useState(pron?.gvET??"");
  const [pen,setPen]=useState(pron?.ganadorPenales??"");
  const [edit,setEdit]=useState(false);
  const [ok,setOk]=useState(false);

  const hayRes=!!res; const hasPron=!!pron;
  const eqL=partido.local||"Por definir";
  const eqV=partido.visitante||"Por definir";
  const esElim=!!partido.esEliminatoria;
  const emp90=gl!==""&&gv!==""&&parseInt(gl)===parseInt(gv);
  const empET=glET!==""&&gvET!==""&&parseInt(glET)===parseInt(gvET);
  const pts=hayRes?(hasPron?calcPuntos(pron,res,cfg,partido.fase):0):null;

  const fecha=new Date(partido.fecha).toLocaleString("es-CO",{
    timeZone:"America/Bogota",day:"2-digit",month:"short",
    hour:"2-digit",minute:"2-digit"
  })+" BOG";

  function guardar(){
    if(gl===""||gv==="") return;
    const glInt=parseInt(gl); const gvInt=parseInt(gv);
    // Si es eliminatoria y hay empate en 90min, exigir que elija quién avanza
    if(esElim && glInt===gvInt && !pen) {
      alert("⚠️ Hay empate — debes seleccionar quién avanza a la siguiente ronda.");
      return;
    }
    const d={gl:glInt,gv:gvInt};
    if(esElim){
      d.glFinal=glInt; d.gvFinal=gvInt;
      if(glInt>gvInt) d.ganadorFinal="L";
      else if(gvInt>glInt) d.ganadorFinal="V";
      else if(pen) d.ganadorFinal=pen===eqL?"L":"V";
    }
    onGuardar(d); setOk(true); setEdit(false);
    setTimeout(()=>setOk(false),2200);
  }

  const mostrar=puedo&&(!hasPron||edit)&&!soloLectura;
  const acento=hayRes?"rgba(45,168,84,0.35)":hasPron?"rgba(232,160,32,0.28)":"var(--border)";
  const barraColor=hayRes?"var(--green2)":hasPron?"var(--gold)":"var(--border)";

  return (
    <div style={{background:"var(--card)",border:`1px solid ${acento}`,borderRadius:12,
      padding:"13px 14px",borderLeft:`3.5px solid ${barraColor}`}}>
      {/* Cabecera */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:12,color:"var(--text)",letterSpacing:0.4,fontWeight:600}}>
          {partido.grupo?`GRUPO ${partido.grupo} · `:""}{FASE_LABELS[partido.fase].toUpperCase()} · {fecha}
        </span>
        {pts!==null&&(
          <span style={{fontSize:13,fontWeight:700,
            color:pts>0?"var(--gold)":pts===0?"#e74c3c":"var(--muted)",
            background:pts===0?"rgba(231,76,60,0.08)":"rgba(232,160,32,0.08)",
            padding:"1px 8px",borderRadius:99}}>
            {pts} pts{pts===0&&!hasPron?" (sin pronóstico)":""}
          </span>
        )}
      </div>

      {/* Marcador */}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {/* Local */}
        <div style={{flex:1,textAlign:"right"}}>
          <div><Flag p={eqL} sz={24}/></div>
          <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginTop:2,lineHeight:1.2}}>{eqL}</div>
        </div>

        {/* Centro */}
        <div style={{textAlign:"center",minWidth:110}}>

          {/* ── PRONÓSTICO DEL JUGADOR — siempre visible si existe ── */}
          {hasPron&&!edit?(
            <div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:"var(--gold)",letterSpacing:3,lineHeight:1}}>
                {pron.gl} – {pron.gv}
              </div>
              <div style={{fontSize:9,color:"var(--gold)",letterSpacing:0.5,marginTop:1,opacity:0.85}}>
                TU PRONÓSTICO
              </div>
            </div>
          ):mostrar?(
            <div style={{display:"flex",alignItems:"center",gap:5,justifyContent:"center"}}>
              <NumIn value={gl} onChange={setGl}/>
              <span style={{color:"var(--muted)",fontWeight:700,fontSize:18}}>–</span>
              <NumIn value={gv} onChange={setGv}/>
            </div>
          ):(
            <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:"rgba(255,255,255,0.12)",letterSpacing:3}}>? – ?</div>
          )}

          {/* ── RESULTADO OFICIAL — debajo, más pequeño, en verde ── */}
          {hayRes&&(
            <div style={{marginTop:6,padding:"4px 8px",
              background:"rgba(45,168,84,0.12)",
              border:"1px solid rgba(45,168,84,0.3)",
              borderRadius:7,display:"inline-block"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:"var(--green2)",letterSpacing:2,lineHeight:1}}>
                {res.gl} – {res.gv}
              </div>
              <div style={{fontSize:8,color:"var(--green2)",letterSpacing:0.5,opacity:0.9}}>
                RESULTADO OFICIAL
              </div>
            </div>
          )}

          {/* Etiqueta cuando no hay pronóstico ni resultado */}
          {!hasPron&&!edit&&!hayRes&&(
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:0.4,marginTop:3}}>90 MIN</div>
          )}
        </div>

        {/* Visitante */}
        <div style={{flex:1,textAlign:"left"}}>
          <div><Flag p={eqV} sz={24}/></div>
          <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginTop:2,lineHeight:1.2}}>{eqV}</div>
        </div>
      </div>

      {/* ELIMINATORIAS: solo quién avanza */}
      {mostrar&&esElim&&(
        <div style={{marginTop:12,background:"var(--bg3)",borderRadius:9,padding:"12px 13px"}}>
          <div style={{fontSize:11,color:"#e74c3c",fontWeight:700,letterSpacing:0.5,marginBottom:8}}>
            🏆 ¿QUIÉN AVANZA? (puede ser en los 90 minutos, tiempo extra o penaltis)
          </div>
          {/* PUNTO 2: Solo mostrar botones de quién avanza si hay empate en 90min,
              o siempre mostrar ambos pero validar al guardar */}
          <div style={{display:"flex",gap:8}}>
            {[eqL,eqV].map(eq=>(
              <button key={eq} onClick={()=>{
                // Solo permitir seleccionar ganador distinto al que ganó en 90min
                const glInt = parseInt(gl);
                const gvInt = parseInt(gv);
                if (gl!==""&&gv!=="") {
                  if (glInt>gvInt && eq===eqV) return; // local gana, no puede avanzar visitante
                  if (gvInt>glInt && eq===eqL) return; // visitante gana, no puede avanzar local
                }
                setPen(eq===pen?"":eq);
              }} style={{
                flex:1,padding:"8px 6px",borderRadius:8,fontSize:12,fontWeight:600,
                border:`1px solid ${pen===eq?"#e74c3c":"var(--border)"}`,
                background:pen===eq?"rgba(231,76,60,0.18)":"transparent",
                color:pen===eq?"#e74c3c":"var(--muted)",
                opacity:(()=>{
                  const glInt=parseInt(gl); const gvInt=parseInt(gv);
                  if(gl!==""&&gv!==""){
                    if(glInt>gvInt&&eq===eqV) return 0.3;
                    if(gvInt>glInt&&eq===eqL) return 0.3;
                  }
                  return 1;
                })(),
              }}><Flag p={eq} sz={15}/> {eq}</button>
            ))}
          </div>
          {gl!==""&&gv!==""&&parseInt(gl)!==parseInt(gv)&&(
            <div style={{fontSize:10,color:"var(--muted)",marginTop:6,textAlign:"center"}}>
              El ganador en 90 min se selecciona automáticamente
            </div>
          )}
        </div>
      )}

      {/* Resultado oficial eliminatoria — siempre visible como referencia */}
      {hayRes&&esElim&&(
        <div style={{marginTop:8,padding:"6px 10px",background:"rgba(45,168,84,0.08)",
          border:"1px solid rgba(45,168,84,0.25)",borderRadius:7}}>
          <div style={{fontSize:8,color:"var(--green2)",letterSpacing:0.5,marginBottom:3,fontWeight:700}}>RESULTADO OFICIAL</div>
          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            {res.glET!==undefined&&(
              <span style={{fontSize:12,color:"var(--green2)"}}>
                Final: <b style={{fontFamily:"'Bebas Neue'",fontSize:16}}>{res.glET}–{res.gvET}</b>
              </span>
            )}
            {res.ganadorFinal&&(
              <span style={{fontSize:12,color:"var(--green2)"}}>
                Avanza: <b><Flag p={res.ganadorFinal==="L"?eqL:eqV} sz={13}/> {res.ganadorFinal==="L"?eqL:eqV}</b>
              </span>
            )}
          </div>
        </div>
      )}

      {/* Pronóstico eliminatoria guardado */}
      {hasPron&&!edit&&!hayRes&&esElim&&(pron.glFinal!==undefined||pron.ganadorFinal)&&(
        <div style={{marginTop:8,background:"rgba(232,160,32,0.06)",borderRadius:8,padding:"7px 11px",fontSize:12}}>
          {pron.glFinal!==undefined&&<span style={{color:"var(--muted)"}}>Tu resultado final: <b style={{color:"var(--gold)",fontFamily:"'Bebas Neue'",fontSize:16}}>{pron.glFinal}–{pron.gvFinal}</b> · </span>}
          {pron.ganadorFinal&&<span style={{color:"var(--muted)"}}>Tu avanza: <b style={{color:"var(--gold)"}}>{pron.ganadorFinal==="L"?eqL:eqV}</b></span>}
        </div>
      )}

      {/* Acciones */}
      {!hayRes&&!soloLectura&&(
        <div style={{marginTop:11,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
          {hasPron&&!edit&&puedo&&(
            <BtnSec onClick={()=>setEdit(true)} style={{fontSize:12,padding:"6px 13px"}}>Editar</BtnSec>
          )}
          {mostrar&&(
            <BtnPrimary onClick={guardar} disabled={gl===""||gv===""} style={{fontSize:12,padding:"7px 16px"}}>
              {ok?"✓ Guardado":"Guardar pronóstico"}
            </BtnPrimary>
          )}
          {!puedo&&!hayRes&&(
            <span style={{fontSize:11,color:"var(--red)"}}>⏰ Tiempo cerrado</span>
          )}
        </div>
      )}
      {!hayRes&&soloLectura&&(
        <div style={{marginTop:8,padding:"5px 10px",background:"rgba(232,160,32,0.07)",
          borderRadius:7,textAlign:"center"}}>
          <span style={{fontSize:11,color:"var(--muted)"}}>👁 Vista de administrador — solo lectura</span>
        </div>
      )}
    </div>
  );
}

// TAB ESPECIALES

function TabEsp({user,esp,setEsp,esAdmin,cfg}) {
  const key_esp = user.email.replace(/\./g,'_').replace(/@/g,'__AT__');
  const mis = esp[key_esp]||{};
  const espRes = esp["__res"]||{};

  const [campeon,setCampeon]       = useState(mis.campeon||"");
  const [subcampeon,setSubcampeon] = useState(mis.subcampeon||"");
  const [tercero,setTercero]       = useState(mis.tercero||"");
  const [cuarto,setCuarto]         = useState(mis.cuarto||"");
  const [goleador,setGoleador]     = useState(mis.goleador||"");
  const [arquero,setArquero]       = useState(mis.arquero||"");
  const [eliminado,setEliminado]   = useState(mis.eliminado||"");
  const [ok,setOk]                 = useState(false);

  const [rCamp,setRCamp]   = useState(espRes.campeon||"");
  const [rSub,setRSub]     = useState(espRes.subcampeon||"");
  const [rTer,setRTer]     = useState(espRes.tercero||"");
  const [rCua,setRCua]     = useState(espRes.cuarto||"");
  const [rGol,setRGol]     = useState(espRes.goleador||"");
  const [rArq,setRArq]     = useState(espRes.arquero||"");
  const [rElim,setRElim]   = useState(espRes.eliminado||"");
  const [okA,setOkA]       = useState(false);

  // Sincronizar con Firebase cuando lleguen los datos (evita que se vea vacío
  // si la conexión tarda en cargar los pronósticos guardados del jugador)
  useEffect(() => {
    setCampeon(mis.campeon||"");
    setSubcampeon(mis.subcampeon||"");
    setTercero(mis.tercero||"");
    setCuarto(mis.cuarto||"");
    setGoleador(mis.goleador||"");
    setArquero(mis.arquero||"");
    setEliminado(mis.eliminado||"");
  }, [esp[key_esp]]);

  useEffect(() => {
    setRCamp(espRes.campeon||"");
    setRSub(espRes.subcampeon||"");
    setRTer(espRes.tercero||"");
    setRCua(espRes.cuarto||"");
    setRGol(espRes.goleador||"");
    setRArq(espRes.arquero||"");
    setRElim(espRes.eliminado||"");
  }, [esp["__res"]]);

  const ELIM_EQ = ["Alemania","Argentina","Brasil","Bélgica","España","Francia","Inglaterra","Países Bajos","Portugal","Uruguay"];

  const puedoEsp = new Date() < new Date("2026-06-11T19:00:00Z");

  function guardar(){
    if (!puedoEsp) return; // Bloquear si el torneo ya comenzó
    setEsp(p=>({...p,[key_esp]:{campeon,subcampeon,tercero,cuarto,goleador,arquero,eliminado}}));
    setOk(true); setTimeout(()=>setOk(false),2500);
  }
  function guardarAdmin(){
    setEsp(p=>({...p,__res:{campeon:rCamp,subcampeon:rSub,tercero:rTer,cuarto:rCua,
      goleador:rGol,arquero:rArq,eliminado:rElim}}));
    setOkA(true); setTimeout(()=>setOkA(false),2500);
  }

  const EqSelect = ({val,set,placeholder}) => (
    <select value={val} onChange={e=>set(e.target.value)}>
      <option value="">— {placeholder} —</option>
      {TODOS.map(eq=>(<option key={eq} value={eq}>{BANDERAS_EMOJI[eq]} {eq}</option>))}

}

function FormRes({partido,res,onGuardar}) {
  const [gl,setGl]=useState(res?.gl??""); const [gv,setGv]=useState(res?.gv??"");
  const [glET,setGlET]=useState(res?.glET??""); const [gvET,setGvET]=useState(res?.gvET??"");
  const [pen,setPen]=useState(res?.ganadorPenales??""); const [ok,setOk]=useState(false);
  const eqL=partido.local||"Por definir"; const eqV=partido.visitante||"Por definir";
  const esElim=!!partido.esEliminatoria;
  const emp90=gl!==""&&gv!==""&&parseInt(gl)===parseInt(gv);
  const empET=glET!==""&&gvET!==""&&parseInt(glET)===parseInt(gvET);

  function guardar(){
    if(gl===""||gv==="") return;
    const glInt=parseInt(gl); const gvInt=parseInt(gv);
    if(esElim && glInt===gvInt && !pen) {
      alert("⚠️ Hay empate — debes seleccionar quién avanza.");
      return;
    }
    const d={gl:glInt,gv:gvInt,esEliminatoria:esElim};
    if(esElim&&pen) d.ganadorFinal=pen===eqL?"L":"V";
    onGuardar(d); setOk(true); setTimeout(()=>setOk(false),2200);
  }

  return (
    <Card borde={res?"rgba(45,168,84,0.3)":"var(--border)"}>
      <div style={{fontSize:12,color:"var(--text)",fontWeight:600,marginBottom:10,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
        <span>{partido.grupo?`GRUPO ${partido.grupo} · `:""}{FASE_LABELS[partido.fase]}</span>
        {res&&<span style={{color:"var(--green2)"}}>✓ Resultado ingresado</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{flex:1,textAlign:"right",minWidth:90,fontSize:13,fontWeight:600}}>
          <Flag p={eqL} sz={16}/> {eqL}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <NumIn value={gl} onChange={setGl}/>
          <span style={{color:"var(--muted)",fontWeight:700}}>–</span>
          <NumIn value={gv} onChange={setGv}/>
        </div>
        <div style={{flex:1,textAlign:"left",minWidth:90,fontSize:13,fontWeight:600}}>
          <Flag p={eqV} sz={16}/> {eqV}
        </div>
        <BtnPrimary onClick={guardar} disabled={gl===""||gv===""} style={{fontSize:12,padding:"7px 14px"}}>
          {ok?"✓":"Guardar"}
        </BtnPrimary>
      </div>
      {esElim&&(
        <div style={{marginTop:11,background:"var(--bg3)",borderRadius:8,padding:"11px 13px"}}>
          <div style={{fontSize:11,color:"#e74c3c",fontWeight:700,marginBottom:6}}>
            🏆 ¿QUIÉN AVANZA?
          </div>
          {/* Aviso si hay empate y no se ha seleccionado ganador */}
          {gl!==""&&gv!==""&&parseInt(gl)===parseInt(gv)&&!pen&&(
            <div style={{marginBottom:8,padding:"6px 10px",background:"rgba(231,76,60,0.12)",
              border:"1px solid rgba(231,76,60,0.4)",borderRadius:7,
              fontSize:12,color:"#e74c3c",fontWeight:600}}>
              ⚠️ Hay empate — debes seleccionar manualmente quién avanza
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            {[eqL,eqV].map(eq=>{
              const glInt=parseInt(gl); const gvInt=parseInt(gv);
              const hayMarcador=gl!==""&&gv!=="";
              // Opacidad: si hay marcador definido y este equipo claramente perdió, se opaca
              const esPerdedor = hayMarcador && (
                (eq===eqL && gvInt>glInt) || (eq===eqV && glInt>gvInt)
              );
              // Si hay marcador definido y no hay empate, auto-seleccionar ganador
              const autoGanador = hayMarcador && glInt!==gvInt
                ? (glInt>gvInt ? eqL : eqV)
                : null;
              const seleccionado = autoGanador ? eq===autoGanador : eq===pen;
              return (
                <button key={eq} onClick={()=>{
                  if(esPerdedor) return; // no permitir clic en perdedor
                  if(autoGanador) return; // ya está auto-seleccionado
                  setPen(eq===pen?"":eq);
                }} style={{
                  flex:1,padding:"7px",borderRadius:8,fontSize:12,fontWeight:600,
                  border:`1px solid ${seleccionado?"#2db854":"var(--border)"}`,
                  background:seleccionado?"rgba(45,168,84,0.18)":"transparent",
                  color:seleccionado?"var(--green2)":esPerdedor?"var(--muted)":"var(--text)",
                  opacity:esPerdedor?0.3:1,
                  cursor:esPerdedor||autoGanador?"default":"pointer",
                }}><Flag p={eq} sz={14}/> {eq}
                  {seleccionado&&" ✓"}
                </button>
              );
            })}
          </div>
          {gl!==""&&gv!==""&&parseInt(gl)!==parseInt(gv)&&(
            <div style={{fontSize:10,color:"var(--muted)",marginTop:5}}>
              El ganador de la llave queda marcado automáticamente
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

function TabAjenos({partidos, prons, tabla, user}) {
  const hoy = new Date();
  const bogota = new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(hoy);

  // Partidos de HOY con equipos ya asignados
  const partidosHoy = partidos.filter(p => {
    if (!p.local || !p.visitante) return false;
    const fp = new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date(p.fecha));
    return fp === bogota;
  }).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

  // Jugadores: yo primero, luego el resto en orden alfabético por nombre
  const jugadores = [...tabla].sort((a,b)=>{
    if (a.email===user.email) return -1;
    if (b.email===user.email) return 1;
    return (a.nombre||a.email).localeCompare(b.nombre||b.email,"es");
  });

  const [abiertos,setAbiertos] = useState({});
  const toggle = id => setAbiertos(prev=>({...prev,[id]:!prev[id]}));

  if (partidosHoy.length===0) {
    return (
      <div>
        <Titulo>Pronósticos Ajenos</Titulo>
        <div style={{textAlign:"center",padding:"40px 20px",color:"var(--muted)"}}>
          <div style={{fontSize:36,marginBottom:10}}>📅</div>
          No hay partidos programados para hoy.<br/>
          Vuelve el día de la próxima fecha para ver los pronósticos de todos.
        </div>
      </div>
    );
  }

  return (
    <div>
      <Titulo>Pronósticos Ajenos</Titulo>
      <p style={{color:"var(--muted)",fontSize:13,marginBottom:16}}>
        Compara tu pronóstico con el de los demás jugadores para los partidos de hoy.
        Toca cada partido para abrir o cerrar la lista. Los pronósticos de días
        anteriores no se muestran aquí.
      </p>

      {partidosHoy.map((p,idx) => {
        const fecha = new Date(p.fecha).toLocaleString("es-CO",{
          timeZone:"America/Bogota",hour:"2-digit",minute:"2-digit"
        })+" BOG";
        const abierto = !!abiertos[p.id];

        // Conteo de cuántos ya pronosticaron este partido
        const totalJug = jugadores.length;
        const conPron = jugadores.filter(u=>{
          const key = u.email.replace(/\./g,'_').replace(/@/g,'__AT__');
          const pron = prons[`${key}_${p.id}`];
          return pron && pron.gl!==undefined && pron.gv!==undefined;
        }).length;

        return (
          <div key={p.id} style={{marginBottom:14,border:"1px solid var(--border)",
            borderRadius:12,overflow:"hidden",
            boxShadow:abierto?"0 0 0 1px rgba(232,160,32,0.25)":"none"}}>

            {/* Encabezado del partido — clicable para abrir/cerrar */}
            <div onClick={()=>toggle(p.id)} style={{cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
              padding:"12px 14px",background:abierto?"rgba(232,160,32,0.1)":"var(--bg3)",
              borderBottom:abierto?"1px solid rgba(232,160,32,0.3)":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,flex:1,minWidth:0,flexWrap:"nowrap"}}>
                <Flag p={p.local} sz={16}/>
                <span style={{fontSize:12,fontWeight:700,color:"var(--text)",flexShrink:0}}>{p.local}</span>
                <span style={{fontSize:11,color:"var(--muted)",flexShrink:0}}>vs</span>
                <Flag p={p.visitante} sz={16}/>
                <span style={{fontSize:12,fontWeight:700,color:"var(--text)",flexShrink:0}}>{p.visitante}</span>
                <span style={{fontSize:11,color:"var(--muted)",flexShrink:0,marginLeft:2}}>· {fecha}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{fontSize:11,color:"var(--muted)",
                  background:"var(--card)",padding:"2px 8px",borderRadius:99}}>
                  {conPron} de {totalJug} pronosticaron
                </span>
                <span style={{fontSize:14,color:"var(--gold)",transform:abierto?"rotate(180deg)":"none",
                  transition:"transform 0.2s",display:"inline-block"}}>▼</span>
              </div>
            </div>

            {/* Lista de pronósticos — solo visible si está abierto */}
            {abierto&&(
              <div style={{display:"flex",flexDirection:"column",gap:6,padding:"12px 14px"}}>
                {jugadores.map(u => {
                  const key = u.email.replace(/\./g,'_').replace(/@/g,'__AT__');
                  const pron = prons[`${key}_${p.id}`];
                  const esYo = u.email===user.email;
                  return (
                    <div key={u.email} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"8px 12px",borderRadius:8,
                      background:esYo?"rgba(232,160,32,0.1)":"var(--card)",
                      border:`1px solid ${esYo?"rgba(232,160,32,0.35)":"var(--border)"}`}}>
                      <span style={{fontSize:13,fontWeight:esYo?700:500,color:esYo?"var(--gold)":"var(--text)"}}>
                        {esYo?"⭐ Tú":(u.nombre||u.email)}
                      </span>
                      {pron && pron.gl!==undefined && pron.gv!==undefined
                        ? <span style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>
                            {pron.gl} - {pron.gv}
                          </span>
                        : <span style={{fontSize:12,color:"var(--muted)",fontStyle:"italic"}}>
                            Pronóstico No Ingresado
                          </span>
                      }
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


function TabExport({partidos, prons, results, esp, cfg, tabla}) {

  function exportar() {
    const wb = XLSX.utils.book_new();
    const ahora = new Date().toLocaleString("es-CO", {timeZone:"America/Bogota"});

    // ── Hoja por jugador ──
    const jugadores = tabla.filter(u => !u.esAdmin);

    jugadores.forEach(u => {
      const key = u.email.replace(/\./g,"_").replace(/@/g,"__AT__");
      const rows = [];

      // Encabezado info jugador
      rows.push(["JUGADOR", u.nombre || u.email]);
      rows.push(["EMAIL", u.email]);
      rows.push(["PUNTAJE TOTAL", u.pts || 0]);
      rows.push([""]);
      rows.push(["FASE", "PARTIDO", "LOCAL", "VISITANTE", "PRONÓSTICO", "RESULTADO OFICIAL", "PUNTOS"]);

      // Partidos ordenados por fase
      const ordenFases = ["grupos","dieciseisavos","octavos","cuartos","semifinales","tercerPuesto","final"];
      const partidosOrdenados = [...partidos].sort((a,b) =>
        ordenFases.indexOf(a.fase) - ordenFases.indexOf(b.fase)
      );

      partidosOrdenados.forEach(p => {
        const pron = prons[key+"_"+p.id];
        const res  = results[p.id];
        const pts  = (pron && res) ? calcPuntos(pron, res, cfg, p.fase) : "";
        const local = p.local || "Por definir";
        const visit = p.visitante || "Por definir";

        let pronTexto = "";
        if (pron) {
          if (p.esEliminatoria) {
            const gl = pron.glFinal !== undefined ? pron.glFinal : pron.gl;
            const gv = pron.gvFinal !== undefined ? pron.gvFinal : pron.gv;
            pronTexto = (gl !== undefined && gv !== undefined) ? `${gl} - ${gv}` : "";
            if (pron.ganadorFinal) pronTexto += ` (avanza: ${pron.ganadorFinal==="L"?local:visit})`;
          } else {
            pronTexto = (pron.gl !== undefined && pron.gv !== undefined) ? `${pron.gl} - ${pron.gv}` : "";
          }
        }

        let resTexto = "";
        if (res) {
          const gl = res.glET !== undefined ? res.glET : res.gl;
          const gv = res.gvET !== undefined ? res.gvET : res.gv;
          resTexto = (gl !== undefined && gv !== undefined) ? `${gl} - ${gv}` : "";
          if (res.ganadorFinal) resTexto += ` (avanza: ${res.ganadorFinal==="L"?local:visit})`;
        }

        rows.push([
          FASE_LABELS[p.fase] || p.fase,
          p.grupo ? `Grupo ${p.grupo} - P${p.partido}` : `P${p.partido}`,
          local,
          visit,
          pronTexto || "Sin pronóstico",
          resTexto  || "Sin resultado",
          pts !== "" ? pts : ""
        ]);
      });

      // Especiales
      const misEsp = esp[key] || {};
      const espRes = esp["__res"] || {};
      rows.push([""]);
      rows.push(["── ESPECIALES ──"]);
      rows.push(["CATEGORÍA", "PRONÓSTICO", "RESULTADO OFICIAL", "PUNTOS"]);

      const especiales = [
        {lbl:"Campeón",      val:misEsp.campeon,    res:espRes.campeon,    pts_key:"pod_campeon",    def:15},
        {lbl:"Subcampeón",   val:misEsp.subcampeon, res:espRes.subcampeon, pts_key:"pod_subcampeon", def:10},
        {lbl:"Tercer Puesto",val:misEsp.tercero,    res:espRes.tercero,    pts_key:"pod_tercero",    def:8},
        {lbl:"Cuarto Puesto",val:misEsp.cuarto,     res:espRes.cuarto,     pts_key:"pod_cuarto",     def:6},
        {lbl:"Goleador",     val:misEsp.goleador,   res:espRes.goleador,   pts_key:"pod_goleador",   def:10},
        {lbl:"Arquero (Guante Oro)",val:misEsp.arquero,res:espRes.arquero, pts_key:"pod_arquero",    def:10},
        {lbl:"Eliminado Grupos",val:misEsp.eliminado,res:espRes.eliminado, pts_key:"pod_eliminado",  def:8},
      ];

      especiales.forEach(e => {
        let pts = "";
        if (e.val && e.res) {
          const ptsVal = (cfg[e.pts_key] !== undefined && cfg[e.pts_key] !== null) ? cfg[e.pts_key] : e.def;
          pts = e.val === e.res ? ptsVal : 0;
        }
        rows.push([e.lbl, e.val||"Sin pronóstico", e.res||"Sin resultado", pts]);
      });

      // Crear hoja
      const ws = XLSX.utils.aoa_to_sheet(rows);
      // Ancho de columnas
      ws["!cols"] = [{wch:22},{wch:20},{wch:18},{wch:18},{wch:22},{wch:22},{wch:8}];
      const nombreHoja = (u.nombre || u.email).substring(0,28).replace(/[:\/?*[\]]/g,"");
      XLSX.utils.book_append_sheet(wb, ws, nombreHoja);
    });

    // ── Hoja resumen: tabla de posiciones ──
    const wsRes = XLSX.utils.aoa_to_sheet([
      ["TABLA DE POSICIONES — LA POLLA SÁNCHEZ — MUNDIAL 2026"],
      ["Generado:", ahora],
      [""],
      ["#","JUGADOR","EMAIL","PUNTAJE TOTAL"],
      ...tabla.filter(u=>!u.esAdmin).map((u,i)=>[i+1, u.nombre||u.email, u.email, u.pts||0])
    ]);
    wsRes["!cols"] = [{wch:4},{wch:22},{wch:30},{wch:14}];
    XLSX.utils.book_append_sheet(wb, wsRes, "Tabla de Posiciones");

    // Descargar
    const fecha = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `PollaSanchez_Respaldo_${fecha}.xlsx`);
  }

  return (
    <div>
      <Titulo>Exportar Respaldo Excel</Titulo>
      <p style={{color:"var(--muted)",fontSize:13,marginBottom:20}}>
        Genera un archivo Excel con todos los pronósticos, resultados y puntajes.
        Una hoja por jugador más una hoja resumen con la tabla de posiciones.
      </p>
      <div style={{background:"rgba(232,160,32,0.07)",border:"1px solid rgba(232,160,32,0.2)",
        borderRadius:10,padding:"16px 18px",marginBottom:24}}>
        <div style={{fontSize:13,color:"var(--text)",marginBottom:8}}>
          📋 <b>El archivo incluirá:</b>
        </div>
        <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.8}}>
          ✅ Una hoja por cada jugador con todos sus pronósticos<br/>
          ✅ Resultado oficial de cada partido<br/>
          ✅ Puntaje obtenido por partido y especiales<br/>
          ✅ Hoja resumen con la tabla de posiciones completa
        </div>
      </div>
      <BtnGold onClick={exportar} style={{padding:"13px 32px",fontSize:15}}>
        📥 Descargar Excel ahora
      </BtnGold>
      <p style={{color:"var(--muted)",fontSize:11,marginTop:12}}>
        Se recomienda descargar al final de cada jornada como respaldo.
      </p>
    </div>
  );
}


function TabCfg({cfg,setCfg}) {
  const [local,setLocal] = useState({...PUNTOS_DEFAULT,...cfg});
  const [ok,setOk]       = useState(false);
  const [dirty,setDirty] = useState(false); // hay cambios sin guardar

  // Sincronizar local cuando Firebase trae datos frescos (solo si no hay cambios sin guardar)
  useEffect(() => {
    if (!dirty) setLocal({...PUNTOS_DEFAULT,...cfg});
  }, [cfg]);

  function actualizarLocal(key, val) {
    const scrollY = window.scrollY;
    setLocal(p=>({...p,[key]:val}));
    setDirty(true);
    requestAnimationFrame(()=>window.scrollTo(0, scrollY));
  }
  function save(){
    setCfg(local);
    FB.set("cfg", local);
    setDirty(false);
    setOk(true);
    setTimeout(()=>setOk(false),3000);
  }

  const Spinner = ({k}) => (
    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
      <button onClick={()=>actualizarLocal(k, Math.max(0,(local[k]||0)-1))}
        style={{width:28,height:28,borderRadius:6,background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text)",fontSize:16}}>−</button>
      <span style={{fontFamily:"'Bebas Neue'",fontSize:24,color:"var(--gold)",minWidth:26,textAlign:"center"}}>{local[k]||0}</span>
      <button onClick={()=>actualizarLocal(k, (local[k]||0)+1)}
        style={{width:28,height:28,borderRadius:6,background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text)",fontSize:16}}>+</button>
    </div>
  );

  const Fila = ({ic,lbl,k}) => (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",

      <span style={{fontSize:18,flexShrink:0}}>{ic}</span>
      <div style={{flex:1,fontSize:13,color:"var(--text)"}}>{lbl}</div>
      <Spinner k={k}/>

      marginTop:20,marginBottom:8,paddingBottom:6,borderBottom:"1px solid var(--border)"}}>
      {children}
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <Titulo style={{margin:0}}>Configuración de Puntos</Titulo>
        {dirty
          ? <button onClick={save} style={{background:"#e74c3c",color:"#fff",border:"none",
              borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",
              animation:"pulse 1s infinite"}}>
              💾 Guardar cambios
            </button>
          : <span style={{background:"rgba(45,168,84,0.15)",color:"var(--green2)",
              border:"1px solid rgba(45,168,84,0.3)",borderRadius:20,
              padding:"5px 14px",fontSize:12,fontWeight:700}}>
              ✓ Guardado
            </span>
        }
      </div>
      <p style={{color:"var(--muted)",fontSize:13,marginBottom:4}}>
        ⚠️ Los puntos configurados se aplican a <b>todos los partidos</b> ya jugados y futuros.
      </p>
      {ok&&<OkMsg msg="✓ Configuración guardada correctamente"/>}

      <SecTitle>⚽ FASE DE GRUPOS</SecTitle>
      <Fila ic="🎯" lbl="Marcador exacto a 90 minutos"        k="g_marcador"/>
      <Fila ic="✅" lbl="Ganador del partido o empate"         k="g_ganador"/>

      <SecTitle>🔗 DIECISEISAVOS DE FINAL</SecTitle>

      <Fila ic="✅" lbl="Quién avanza"                             k="d16_ganador"/>

      <SecTitle>🔗 OCTAVOS DE FINAL</SecTitle>

      <Fila ic="✅" lbl="Quién avanza"             k="cua_ganador"/>

      <Fila ic="✅" lbl="Quién avanza"             k="sem_ganador"/>

      <SecTitle>🔗 FINAL</SecTitle>

      <Fila ic="✅" lbl="Campeón (quién gana la final)" k="fin_ganador"/>

        )}
        <BtnGold onClick={save} style={{padding:"11px 28px",
          boxShadow:dirty?"0 0 0 3px rgba(232,160,32,0.4)":"none",
          transform:dirty?"scale(1.02)":"scale(1)",transition:"all 0.2s"}}>
          {ok ? "✓ Configuración guardada" : dirty ? "💾 Guardar puntuación asignada" : "Guardar configuración de puntos"}
        </BtnGold>

  );

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {usuarios.map((u,i)=>(
          <Card key={u.email}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"var(--bg3)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'Bebas Neue'",fontSize:16,color:"var(--muted)",flexShrink:0}}>
                {i+1}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{u.nombre}</div>
                <div style={{fontSize:11,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                {ok===u.email&&<div style={{fontSize:11,color:"var(--green2)",marginTop:2}}>✓ Pronósticos borrados</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:"var(--gold)"}}>{u.pts}</div>
                  <div style={{fontSize:9,color:"var(--muted)",letterSpacing:1}}>PTS</div>
                </div>
                {confirmando===u.email?(
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                    <div style={{fontSize:10,color:"#e74c3c",textAlign:"center"}}>¿Confirmar?</div>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>confirmarBorrar(u.email)}
                        style={{background:"rgba(231,76,60,0.2)",border:"1px solid #e74c3c",
                          borderRadius:6,padding:"3px 8px",color:"#e74c3c",fontSize:11,fontWeight:700}}>
                        Sí
                      </button>
                      <button onClick={()=>setConfirmando(null)}
                        style={{background:"var(--bg3)",border:"1px solid var(--border)",
                          borderRadius:6,padding:"3px 8px",color:"var(--muted)",fontSize:11}}>
                        No
                      </button>
                    </div>
                  </div>
                ):(
                  <button onClick={()=>borrar(u)}
                    style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",
                      borderRadius:7,padding:"5px 9px",color:"#e74c3c",fontSize:11,fontWeight:600}}>
                    🗑 Borrar pronósticos
                  </button>
                )}
              </div>
            </div>
          </Card>
        ))}
        {usuarios.length===0&&<div style={{color:"var(--muted)",textAlign:"center",padding:30}}>Sin participantes aún</div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

</body>
</html>
